<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - Expense Splitter</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background: #f0f2f5; }
        .navbar { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%) !important; }
        .profile-card { border: none; border-radius: 18px; }
        .avatar-circle { width: 90px; height: 90px; border-radius: 50%; background: linear-gradient(135deg, #667eea, #764ba2); display: flex; align-items: center; justify-content: center; color: white; font-size: 2.2rem; font-weight: bold; margin: 0 auto; }
        .stat-badge { background: white; border: 1px solid #e9ecef; border-radius: 12px; padding: 0.8rem 1.2rem; text-align: center; }
        .info-row { border-bottom: 1px solid #f0f0f0; padding: 0.75rem 0; }
        .info-row:last-child { border-bottom: none; }
        #loadingOverlay { position: fixed; inset: 0; background: rgba(255,255,255,0.85); z-index: 9999; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="loadingOverlay">
        <div class="spinner-border text-primary" style="width:3rem;height:3rem;"></div>
    </div>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand fw-bold fs-4" href="../index.html">💰 Expense Splitter</a>
            <div class="d-flex gap-2">
                <a href="dashboard.html"   class="btn btn-light btn-sm">Dashboard</a>
                <a href="groups.html"      class="btn btn-light btn-sm">Groups</a>
                <a href="expenses.html"    class="btn btn-light btn-sm">Expenses</a>
                <a href="settelments.html" class="btn btn-light btn-sm">Settle</a>
                <button onclick="logout()" class="btn btn-danger btn-sm">Logout</button>
            </div>
        </div>
    </nav>

    <div class="container py-4">

        <div class="row justify-content-center">
            <div class="col-md-7">

                <!-- Alerts -->
                <div id="errorAlert" class="alert alert-danger d-none mb-3"></div>

                <!-- Profile Card -->
                <div class="card profile-card shadow-sm mb-4">
                    <div class="card-body p-4">

                        <!-- Avatar + Name -->
                        <div class="text-center mb-4">
                            <div class="avatar-circle mb-3" id="avatarInitials">?</div>
                            <h3 class="fw-bold mb-0" id="profileName">--</h3>
                            <p class="text-muted mb-0" id="profileEmail">--</p>
                            <span class="badge bg-success mt-2">Active Account</span>
                        </div>

                        <hr>

                        <!-- Info Rows -->
                        <div class="info-row d-flex justify-content-between">
                            <span class="text-muted"><i class="bi bi-person-fill me-2"></i>Full Name</span>
                            <span class="fw-semibold" id="infoName">--</span>
                        </div>
                        <div class="info-row d-flex justify-content-between">
                            <span class="text-muted"><i class="bi bi-envelope-fill me-2"></i>Email</span>
                            <span class="fw-semibold" id="infoEmail">--</span>
                        </div>
                        <div class="info-row d-flex justify-content-between">
                            <span class="text-muted"><i class="bi bi-calendar-fill me-2"></i>Member Since</span>
                            <span class="fw-semibold" id="infoJoined">--</span>
                        </div>

                    </div>
                </div>

                <!-- Stats Card -->
                <div class="card profile-card shadow-sm mb-4">
                    <div class="card-body p-4">
                        <h5 class="fw-bold mb-3">📊 Your Activity</h5>
                        <div class="row g-3">
                            <div class="col-4">
                                <div class="stat-badge">
                                    <div class="fs-4 fw-bold text-primary" id="statGroups">--</div>
                                    <div class="text-muted small">Groups</div>
                                </div>
                            </div>
                            <div class="col-4">
                                <div class="stat-badge">
                                    <div class="fs-4 fw-bold text-success" id="statExpenses">--</div>
                                    <div class="text-muted small">Expenses</div>
                                </div>
                            </div>
                            <div class="col-4">
                                <div class="stat-badge">
                                    <div class="fs-4 fw-bold text-warning" id="statAmount">--</div>
                                    <div class="text-muted small">Total Spent</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Actions Card -->
                <div class="card profile-card shadow-sm">
                    <div class="card-body p-4">
                        <h5 class="fw-bold mb-3">⚡ Quick Actions</h5>
                        <div class="d-flex flex-wrap gap-2">
                            <a href="groups.html"      class="btn btn-outline-primary"><i class="bi bi-people-fill me-1"></i>My Groups</a>
                            <a href="expenses.html"    class="btn btn-outline-success"><i class="bi bi-cash-stack me-1"></i>Expenses</a>
                            <a href="settelments.html" class="btn btn-outline-warning"><i class="bi bi-arrow-left-right me-1"></i>Settle Up</a>
                            <button onclick="logout()" class="btn btn-danger"><i class="bi bi-box-arrow-right me-1"></i>Logout</button>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

<script src="../js/config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const token = localStorage.getItem('token');

    if (!token) window.location.href = 'login.html';

    async function loadProfile() {
        try {
            // Fetch profile and dashboard stats in parallel
            const [profileRes, dashRes] = await Promise.all([
                fetch(`${API}/auth/profile`,  { headers: authHeader() }),
                fetch(`${API}/dashboard`,     { headers: authHeader() })
            ]);

            if (profileRes.status === 401) { logout(); return; }

            const profileData = await profileRes.json();
            const dashData    = dashRes.ok ? await dashRes.json() : null;

            if (!profileRes.ok) {
                document.getElementById('errorAlert').textContent = profileData.message;
                document.getElementById('errorAlert').classList.remove('d-none');
                return;
            }

            const u = profileData.user;

            // Avatar initials
            const initials = u.name.split(' ').map(n => n[0]).join('').substring(0, 2).toUpperCase();
            document.getElementById('avatarInitials').textContent = initials;

            // Header info
            document.getElementById('profileName').textContent  = u.name;
            document.getElementById('profileEmail').textContent = u.email;

            // Info rows
            document.getElementById('infoName').textContent    = u.name;
            document.getElementById('infoEmail').textContent   = u.email;
            document.getElementById('infoJoined').textContent  = u.createdAt
                ? new Date(u.createdAt).toLocaleDateString('en-IN', {day:'numeric', month:'long', year:'numeric'})
                : 'N/A';

            // Stats from dashboard
            if (dashData?.dashboard) {
                const d = dashData.dashboard;
                document.getElementById('statGroups').textContent   = d.totalGroups;
                document.getElementById('statExpenses').textContent  = d.totalExpenses;
                document.getElementById('statAmount').textContent    = `₹${Number(d.totalAmount).toLocaleString('en-IN')}`;
            }

        } catch (err) {
            document.getElementById('errorAlert').textContent = 'Failed to load profile. Is the server running?';
            document.getElementById('errorAlert').classList.remove('d-none');
        } finally {
            document.getElementById('loadingOverlay').style.display = 'none';
        }
    }

    function authHeader() { return { 'Authorization': `Bearer ${token}` }; }
    function logout()     { localStorage.clear(); window.location.href = 'login.html'; }

    loadProfile();
</script>
</body>
</html>
