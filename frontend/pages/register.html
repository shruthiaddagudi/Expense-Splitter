<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Expense Splitter</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
        .card { border: none; border-radius: 16px; }
        .btn-success { background: linear-gradient(135deg, #11998e, #38ef7d); border: none; }
        .brand-title { background: linear-gradient(135deg, #667eea, #764ba2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        #errorAlert { display: none; }
        #successAlert { display: none; }
        .spinner-border { width: 1.2rem; height: 1.2rem; }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center py-5">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">

                <div class="card shadow-lg p-4">

                    <div class="text-center mb-4">
                        <h2 class="fw-bold brand-title">💰 Expense Splitter</h2>
                        <p class="text-muted">Create your account</p>
                    </div>

                    <!-- Error Alert -->
                    <div id="errorAlert" class="alert alert-danger alert-dismissible" role="alert">
                        <span id="errorMsg"></span>
                        <button type="button" class="btn-close" onclick="document.getElementById('errorAlert').style.display='none'"></button>
                    </div>

                    <!-- Success Alert -->
                    <div id="successAlert" class="alert alert-success" role="alert">
                        ✅ Registered successfully! Redirecting to dashboard...
                    </div>

                    <form id="registerForm">

                        <div class="mb-3">
                            <label for="regName" class="form-label fw-semibold">Full Name</label>
                            <input type="text" id="regName" class="form-control" placeholder="Enter your full name" required>
                        </div>

                        <div class="mb-3">
                            <label for="regEmail" class="form-label fw-semibold">Email Address</label>
                            <input type="email" id="regEmail" class="form-control" placeholder="Enter email" required>
                        </div>

                        <div class="mb-3">
                            <label for="regPassword" class="form-label fw-semibold">Password</label>
                            <input type="password" id="regPassword" class="form-control" placeholder="Min 6 characters" required>
                        </div>

                        <div class="mb-4">
                            <label for="regConfirm" class="form-label fw-semibold">Confirm Password</label>
                            <input type="password" id="regConfirm" class="form-control" placeholder="Repeat password" required>
                        </div>

                        <button type="submit" id="registerBtn" class="btn btn-success w-100 py-2 fw-semibold">
                            <span id="btnText">Create Account</span>
                            <span id="btnSpinner" class="spinner-border ms-2 d-none" role="status"></span>
                        </button>

                    </form>

                    <p class="text-center mt-3 mb-0 text-muted">
                        Already have an account?
                        <a href="login.html" class="fw-semibold text-decoration-none">Login</a>
                    </p>

                </div>

            </div>
        </div>
    </div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const API = 'http://localhost:5000/api';

    // If already logged in, redirect to dashboard
    if (localStorage.getItem('token')) {
        window.location.href = 'dashboard.html';
    }

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        const name     = document.getElementById('regName').value.trim();
        const email    = document.getElementById('regEmail').value.trim();
        const password = document.getElementById('regPassword').value;
        const confirm  = document.getElementById('regConfirm').value;

        // Client-side validation
        if (password !== confirm) {
            showError('Passwords do not match.');
            return;
        }
        if (password.length < 6) {
            showError('Password must be at least 6 characters.');
            return;
        }

        setLoading(true);

        try {
            const res = await fetch(`${API}/auth/register`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, email, password })
            });

            const data = await res.json();

            if (!res.ok) {
                showError(data.message || 'Registration failed.');
                return;
            }

            // Save token and user info
            localStorage.setItem('token', data.token);
            localStorage.setItem('user', JSON.stringify(data.user));

            // Show success and redirect
            document.getElementById('successAlert').style.display = 'block';
            document.getElementById('registerForm').style.display = 'none';
            setTimeout(() => window.location.href = 'dashboard.html', 1500);

        } catch (err) {
            showError('Cannot connect to server. Make sure backend is running on port 5000.');
        } finally {
            setLoading(false);
        }
    });

    function showError(msg) {
        document.getElementById('errorMsg').textContent = msg;
        document.getElementById('errorAlert').style.display = 'block';
    }

    function setLoading(loading) {
        document.getElementById('registerBtn').disabled = loading;
        document.getElementById('btnSpinner').classList.toggle('d-none', !loading);
    }
</script>
</body>
</html>
