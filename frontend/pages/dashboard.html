<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Expense Splitter</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background: #f0f2f5; }
        .navbar { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%) !important; }
        .stat-card { border: none; border-radius: 14px; transition: transform 0.2s; }
        .stat-card:hover { transform: translateY(-4px); }
        .stat-icon { font-size: 2rem; }
        .card-groups  { background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
        .card-expenses{ background: linear-gradient(135deg, #11998e, #38ef7d); color: white; }
        .card-amount  { background: linear-gradient(135deg, #f093fb, #f5576c); color: white; }
        .card-recent  { border: none; border-radius: 14px; }
        .expense-item { border-left: 4px solid #667eea; border-radius: 8px; background: white; }
        .welcome-name { background: linear-gradient(135deg, #667eea, #764ba2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .quick-btn { border-radius: 12px; padding: 0.6rem 1.4rem; font-weight: 600; }
        #loadingOverlay { position: fixed; inset: 0; background: rgba(255,255,255,0.85); z-index: 9999; display: flex; align-items: center; justify-content: center; flex-direction: column; }
    </style>
</head>
<body>

    <!-- Loading Overlay -->
    <div id="loadingOverlay">
        <div class="spinner-border text-primary mb-3" style="width:3rem;height:3rem;"></div>
        <p class="text-muted">Loading dashboard...</p>
    </div>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand fw-bold fs-4" href="../index.html">💰 Expense Splitter</a>
            <div class="d-flex align-items-center gap-2">
                <span class="text-white me-2" id="navUsername"></span>
                <a href="groups.html" class="btn btn-light btn-sm">Groups</a>
                <a href="expenses.html" class="btn btn-light btn-sm">Expenses</a>
                <a href="settelments.html" class="btn btn-light btn-sm">Settle</a>
                <a href="profile.html" class="btn btn-outline-light btn-sm">Profile</a>
                <button onclick="logout()" class="btn btn-danger btn-sm">Logout</button>
            </div>
        </div>
    </nav>

    <div class="container py-4">

        <!-- Welcome -->
        <div class="mb-4">
            <h2 class="fw-bold">Welcome back, <span id="welcomeName" class="welcome-name">...</span> 👋</h2>
            <p class="text-muted mb-0">Here's your expense overview</p>
        </div>

        <!-- Error Banner -->
        <div id="errorBanner" class="alert alert-danger d-none"></div>

        <!-- Stats Row -->
        <div class="row g-3 mb-4">

            <div class="col-md-4">
                <div class="card stat-card card-groups shadow-sm p-3">
                    <div class="d-flex align-items-center gap-3">
                        <div class="stat-icon">👥</div>
                        <div>
                            <div class="fs-5 opacity-75">Total Groups</div>
                            <div class="display-6 fw-bold" id="totalGroups">--</div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card stat-card card-expenses shadow-sm p-3">
                    <div class="d-flex align-items-center gap-3">
                        <div class="stat-icon">🧾</div>
                        <div>
                            <div class="fs-5 opacity-75">Total Expenses</div>
                            <div class="display-6 fw-bold" id="totalExpenses">--</div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card stat-card card-amount shadow-sm p-3">
                    <div class="d-flex align-items-center gap-3">
                        <div class="stat-icon">💸</div>
                        <div>
                            <div class="fs-5 opacity-75">Total Amount Spent</div>
                            <div class="display-6 fw-bold" id="totalAmount">--</div>
                        </div>
                    </div>
                </div>
            </div>

        </div>

        <!-- Quick Actions -->
        <div class="d-flex gap-2 flex-wrap mb-4">
            <a href="groups.html" class="btn btn-primary quick-btn">
                <i class="bi bi-plus-circle me-1"></i> New Group
            </a>
            <a href="expenses.html" class="btn btn-success quick-btn">
                <i class="bi bi-cash-stack me-1"></i> Add Expense
            </a>
            <a href="settelments.html" class="btn btn-warning quick-btn">
                <i class="bi bi-arrow-left-right me-1"></i> Settle Up
            </a>
        </div>

        <!-- Recent Expenses -->
        <div class="card card-recent shadow-sm">
            <div class="card-header bg-white border-0 pt-3">
                <h5 class="fw-bold mb-0">🕐 Recent Expenses</h5>
            </div>
            <div class="card-body" id="recentExpensesContainer">
                <p class="text-muted text-center py-4">Loading...</p>
            </div>
        </div>

    </div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const API = 'http://localhost:5000/api';
    const token = localStorage.getItem('token');
    const user  = JSON.parse(localStorage.getItem('user') || 'null');

    // ── Auth Guard ─────────────────────────
    if (!token) window.location.href = 'login.html';

    // ── Greet user ─────────────────────────
    if (user) {
        document.getElementById('welcomeName').textContent = user.name;
        document.getElementById('navUsername').textContent = `Hi, ${user.name}`;
    }

    // ── Fetch Dashboard ─────────────────────
    async function loadDashboard() {
        try {
            const res = await fetch(`${API}/dashboard`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });

            if (res.status === 401) { logout(); return; }

            const data = await res.json();

            if (!res.ok) {
                document.getElementById('errorBanner').textContent = data.message;
                document.getElementById('errorBanner').classList.remove('d-none');
                return;
            }

            const d = data.dashboard;

            document.getElementById('totalGroups').textContent   = d.totalGroups;
            document.getElementById('totalExpenses').textContent = d.totalExpenses;
            document.getElementById('totalAmount').textContent   = `₹${d.totalAmount.toLocaleString('en-IN')}`;

            renderRecentExpenses(d.recentExpenses);

        } catch (err) {
            document.getElementById('errorBanner').textContent = 'Failed to load dashboard. Is the server running?';
            document.getElementById('errorBanner').classList.remove('d-none');
        } finally {
            document.getElementById('loadingOverlay').style.display = 'none';
        }
    }

    function renderRecentExpenses(expenses) {
        const container = document.getElementById('recentExpensesContainer');

        if (!expenses || expenses.length === 0) {
            container.innerHTML = `
                <div class="text-center py-4 text-muted">
                    <div style="font-size:2.5rem;">🧾</div>
                    <p class="mt-2">No expenses yet. <a href="expenses.html">Add your first one!</a></p>
                </div>`;
            return;
        }

        container.innerHTML = expenses.map(exp => `
            <div class="expense-item p-3 mb-2 d-flex justify-content-between align-items-center">
                <div>
                    <div class="fw-semibold">${escHtml(exp.description)}</div>
                    <small class="text-muted">
                        Paid by <strong>${escHtml(exp.paidBy?.name || 'Unknown')}</strong>
                        · ${escHtml(exp.groupId?.groupName || '')}
                        · ${new Date(exp.createdAt).toLocaleDateString('en-IN', {day:'numeric',month:'short',year:'numeric'})}
                    </small>
                </div>
                <span class="badge bg-primary fs-6">₹${Number(exp.amount).toLocaleString('en-IN')}</span>
            </div>`).join('');
    }

    function logout() {
        localStorage.removeItem('token');
        localStorage.removeItem('user');
        window.location.href = 'login.html';
    }

    // Escape HTML to prevent XSS
    function escHtml(str) {
        return String(str).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }

    loadDashboard();
</script>
</body>
</html>
